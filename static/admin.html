<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body class="admin-body">
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="icon-sun">&#9728;</span>
        <span class="icon-moon">&#9790;</span>
    </button>

    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-header-left">
                <img src="/static/images/toa-white.png" alt="The Open Accelerator" class="brand-logo logo-light">
                <img src="/static/images/toa-black.png" alt="The Open Accelerator" class="brand-logo logo-dark">
                <div>
                    <h1>Innovate Together</h1>
                    <p class="admin-event-name" id="admin-event-name"></p>
                </div>
            </div>
            <div class="header-status-group">
                <div class="printer-status">
                    <span class="status-dot gray" id="printer-dot"></span>
                    <span id="printer-label">Printer: checking...</span>
                </div>
                <div class="sync-status" id="sync-status" style="display:none;">
                    <span class="status-dot green" id="sync-dot"></span>
                    <span id="sync-label">Auto-sync: active</span>
                </div>
            </div>
        </div>

        <!-- Stats (clickable filters) -->
        <div class="stats-bar">
            <button class="stat-card stat-filter active" data-filter="all" onclick="setStatusFilter('all')">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Registered</div>
            </button>
            <button class="stat-card stat-filter" data-filter="checked_in" onclick="setStatusFilter('checked_in')">
                <div class="stat-value success" id="stat-checkedin">0</div>
                <div class="stat-label">Checked In</div>
            </button>
            <button class="stat-card stat-filter" data-filter="remaining" onclick="setStatusFilter('remaining')">
                <div class="stat-value info" id="stat-remaining">0</div>
                <div class="stat-label">Remaining</div>
            </button>
        </div>

        <!-- Actions -->
        <div class="admin-actions">
            <button class="btn btn-primary" onclick="document.getElementById('csv-input').click()">Upload CSV</button>
            <button class="btn btn-secondary" id="btn-sync-luma">Sync from Luma API</button>
            <button class="btn btn-secondary" id="btn-qr">Generate QR Code</button>
            <a href="/" class="btn btn-secondary" target="_blank">Open Check-In Page</a>
            <button class="btn btn-danger" id="btn-clear-data">Clear All Data</button>
        </div>

        <!-- CSV Upload (hidden input) -->
        <input type="file" id="csv-input" accept=".csv" style="display:none">

        <!-- Upload Drop Area -->
        <div class="upload-area" id="upload-area">
            <p>Drag and drop a CSV file here, or click "Upload CSV" above</p>
            <p class="hint">Accepts Luma guest export CSV files</p>
        </div>

        <!-- QR Code Display -->
        <div id="qr-container" style="display:none; text-align:center; margin-bottom:24px;">
            <img id="qr-image" style="max-width: 300px; border: 1px solid var(--border); border-radius: var(--radius);">
            <p class="hint" style="margin-top: 8px;">Check-in URL QR code — print and display at venue entrance</p>
        </div>

        <!-- Guest Table -->
        <div class="guest-table-container">
            <div class="table-header">
                <h3>Guests (<span id="table-count">0</span>)</h3>
                <input type="text" class="table-search" id="table-search" placeholder="Filter guests...">
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="guest-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
